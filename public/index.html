<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoList</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loginForm">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <label>
      <input type="checkbox" id="keepLoggedIn"> <span id="check">Keep me logged in</span>
    </label>
    <button id="login" onclick="login()">Login</button>
    <button id="register" onclick="register()">Register</button>
  </div>
  
  <div id="todoApp" style="display: none;">
    <h1>To-Do List</h1>
    <button id="logoutButton" onclick="logout()">Logout</button>
    <div class="container">
      <div class="fields">
        <input type="text" id="taskInput" placeholder="Add a task">
        <button onclick="addTask()">
          <ion-icon name="add-circle-outline"></ion-icon>
        </button>
      </div>
      <div class="tabs">
        <button class="active-tab" onclick="showTab('inProgress', event)">In Progress</button>
        <button onclick="showTab('completed', event)">Completed</button>
      </div>
      <ul id="taskList" class="tab-content"></ul>
      <ul id="completedTaskList" class="tab-content" style="display:none;"></ul>
    </div>
  </div>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.3.3/purify.min.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
